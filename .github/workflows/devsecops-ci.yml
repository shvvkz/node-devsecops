name: DevSecOps Pipeline Node

on:
  push:
    branches:
      - feat/fix-ci

jobs:

  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install dependencies
        run: npm install

      - name: 4. Install ESLint
        run: npm install eslint --save-dev

      - name: 5. Run ESLint
        run: npx eslint .

      - name: 6. Install yamllint
        run: |
          python3 -m pip install --upgrade pip
          pip3 install yamllint

      - name: 7. Lint Kubernetes YAML
        run: yamllint k8s/deployment.yaml


  policy:
    name: Security Policies (Conftest)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Conftest
        run: |
          CONFTEST_VERSION=0.67.1
          curl -L "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o /tmp/conftest.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /tmp
          sudo mv /tmp/conftest /usr/local/bin/conftest
          sudo chmod +x /usr/local/bin/conftest

      - name: 3. Run Conftest
        run: conftest test k8s/deployment.yaml --policy policy


  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: 3. Run filesystem scan
        run: trivy fs --scanners vuln,secret,misconfig --format json --output trivy-fs.json . || true

      - name: 4. Build Docker image
        run: docker build -t node-devsecops:ci .

      - name: 5. Run image scan
        run: trivy image --scanners vuln,secret,misconfig --format json --output trivy-image.json node-devsecops:ci || true

      - name: 6. Upload filesystem report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs.json

      - name: 7. Upload image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image.json


  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, policy, security]

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Build Docker image
        run: docker build -t node-devsecops:final .