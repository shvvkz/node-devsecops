name: DevSecOps Pipeline Node

on:
  push:
    branches:
      - main

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clone repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 3. Install Node dependencies
        run: npm install

      - name: 4. Install YAML linter
        run: |
          python3 -m pip install --upgrade pip
          pip3 install yamllint

      - name: 5. Validate Kubernetes YAML
        run: yamllint k8s/deployment.yaml

      - name: 6. Install Conftest (OPA policies)
        run: |
          CONFTEST_VERSION=0.67.1
          curl -L "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o /tmp/conftest.tar.gz
          tar -xzf /tmp/conftest.tar.gz -C /tmp
          sudo mv /tmp/conftest /usr/local/bin/conftest
          sudo chmod +x /usr/local/bin/conftest

      - name: 7. Run security policy checks (Conftest)
        run: conftest test k8s/deployment.yaml --policy policy

      - name: 8. Install Trivy scanner
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: 9. Run Trivy filesystem scan (export JSON)
        run: trivy fs --scanners vuln,secret,misconfig --format json --output trivy-fs.json . || true

      - name: 10. Build Docker image
        run: docker build -t node-devsecops:ci .

      - name: 11. Run Trivy image scan (export JSON)
        run: trivy image --scanners vuln,secret,misconfig --format json --output trivy-image.json node-devsecops:ci || true

      - name: 12. Debug generated files
        run: ls -lah

      - name: 13. Upload filesystem scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs.json

      - name: 14. Upload container image scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image.json